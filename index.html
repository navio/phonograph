<!DOCTYPE html>
<html lang="en" phonograph="true">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#2196f3" />
    <meta http-equiv="x-dns-prefetch-control" content="on" />

    <meta property="og:title" content="Phonograph" />
    <meta property="og:type" content="video.movie" />
    <meta property="og:url" content="https://phonograph.app/" />
    <meta property="og:description" content="Podcast Application" />
    <meta
      property="og:image"
      content="/android-chrome-512x512.png"
    />

    <meta name="title" content="Phonograph - A podcast application" />
    <meta
      name="description"
      content="Phonograph is a podcast application that runs with minimal requirements. Our goal is to provide a seamless experience to enjoy podcasts"
    />
    <meta
      name="keywords"
      content="podcast, application, web, pwa, podcast search, offline podcasts"
    />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="1 day" />
    <meta name="author" content="Alberto Navarro" />

    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#d55b5b" />
    <meta name="msapplication-TileColor" content="#2b5797" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>Phonograph</title>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
    <script>
      (function () {
        var root = document.getElementById("root");
        if (root && !root.innerHTML) {
          root.innerHTML = "<div style=\"padding:16px;font-family:Arial, sans-serif;\">Loading...\</div>";
        }
        window.addEventListener("error", function (event) {
          var message = (event && (event.error && event.error.stack)) || event.message || String(event);
          var pre = document.createElement("pre");
          pre.style.cssText = "white-space: pre-wrap; color: #b00020; padding: 16px;";
          pre.textContent = "Phonograph startup error:\n" + message;
          document.body.appendChild(pre);
        });
      })();
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
