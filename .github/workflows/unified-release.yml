name: Unified Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: unified-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-targets:
    name: Detect release targets
    runs-on: ubuntu-latest
    outputs:
      has_desktop: ${{ steps.detect.outputs.has_desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect desktop workspace
        id: detect
        shell: bash
        run: |
          if [[ -f src-tauri/Cargo.toml && -f src-tauri/tauri.conf.json ]]; then
            echo "has_desktop=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_desktop=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report release targets
        run: |
          {
            echo "## Unified release targets"
            echo "- Tag: ${{ github.ref_name }}"
            echo "- Web release: enabled"
            echo "- Desktop release: ${{ steps.detect.outputs.has_desktop }}"
          } >> "$GITHUB_STEP_SUMMARY"

  web-release:
    name: Build web release artifact
    runs-on: ubuntu-latest
    needs: detect-targets
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build production web bundle
        run: yarn build

      - name: Archive web distribution
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          archive="Phonograph-web-${GITHUB_REF_NAME}.tar.gz"
          tar -czf "$archive" dist
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Upload web release artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release-assets-${{ github.run_id }}
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error

      - name: Report web release artifact status
        if: always()
        run: |
          {
            echo "## Web release artifact"
            echo "- Build: ${{ job.status }}"
            echo "- Asset: ${{ steps.archive.outputs.archive }}"
          } >> "$GITHUB_STEP_SUMMARY"

  desktop-release-macos:
    name: Build desktop release assets (macOS)
    runs-on: macos-latest
    needs: detect-targets
    if: needs.detect-targets.outputs.has_desktop == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Sync desktop versions
        run: node scripts/sync-tauri-version.mjs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS desktop bundles
        shell: bash
        run: |
          set -euo pipefail
          yarn desktop:build -- --bundles app,dmg

      - name: Prepare stable release asset names
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          arm_dmg="$(find src-tauri/target/release/bundle -type f -name '*aarch64*.dmg' | head -n 1)"
          intel_dmg="$(find src-tauri/target/release/bundle -type f -name '*x64*.dmg' | head -n 1)"

          if [[ -z "$arm_dmg" || -z "$intel_dmg" ]]; then
            echo "Expected both arm64 and x64 macOS DMG artifacts, but at least one is missing."
            find src-tauri/target/release/bundle -type f || true
            exit 1
          fi

          cp "$arm_dmg" release-assets/Phonograph-macOS-Apple-Silicon.dmg
          cp "$intel_dmg" release-assets/Phonograph-macOS-Intel.dmg

      - name: Upload desktop release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-assets-${{ github.run_id }}
          path: release-assets/*.dmg
          if-no-files-found: error

      - name: Report desktop release artifact status
        if: always()
        run: |
          {
            echo "## Desktop release artifacts"
            echo "- Build: ${{ job.status }}"
            echo "- Asset: Phonograph-macOS-Apple-Silicon.dmg"
            echo "- Asset: Phonograph-macOS-Intel.dmg"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-release:
    name: Publish unified release
    runs-on: ubuntu-latest
    needs:
      - detect-targets
      - web-release
      - desktop-release-macos
    if: always()
    steps:
      - name: Validate upstream job outcomes
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          web_result="${{ needs.web-release.result }}"
          desktop_result="${{ needs.desktop-release-macos.result }}"
          has_desktop="${{ needs.detect-targets.outputs.has_desktop }}"

          {
            echo "## Unified release status"
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Web release artifact | ${web_result} |"
            echo "| Desktop release artifact | ${desktop_result} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "$web_result" != "success" ]]; then
            echo "Web release artifact failed; blocking release publish."
            exit 1
          fi

          if [[ "$has_desktop" == "true" && "$desktop_result" != "success" ]]; then
            echo "Desktop release artifact failed; blocking release publish."
            exit 1
          fi

      - name: Download web artifacts
        uses: actions/download-artifact@v4
        with:
          name: web-release-assets-${{ github.run_id }}
          path: release-assets

      - name: Download desktop artifacts
        if: needs.detect-targets.outputs.has_desktop == 'true'
        uses: actions/download-artifact@v4
        with:
          name: desktop-release-assets-${{ github.run_id }}
          path: release-assets

      - name: Validate release payload
        shell: bash
        run: |
          set -euo pipefail
          web_asset_count="$(find release-assets -maxdepth 1 -type f -name 'Phonograph-web-*.tar.gz' | wc -l | tr -d ' ')"
          if [[ "$web_asset_count" -lt 1 ]]; then
            echo "Missing web release archive in release-assets/."
            exit 1
          fi

          if [[ "${{ needs.detect-targets.outputs.has_desktop }}" == "true" ]]; then
            if [[ ! -f release-assets/Phonograph-macOS-Apple-Silicon.dmg || ! -f release-assets/Phonograph-macOS-Intel.dmg ]]; then
              echo "Missing expected desktop DMG assets in release payload."
              find release-assets -maxdepth 1 -type f || true
              exit 1
            fi
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Phonograph Release ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Report publish status
        if: always()
        run: |
          {
            echo "## Publish status"
            echo "- Release tag: ${{ github.ref_name }}"
            echo "- Publish result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
