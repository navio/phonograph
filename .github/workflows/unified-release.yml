name: Unified Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (for example v1.2.3)"
        required: false
        type: string
      draft:
        description: "Publish as draft release"
        required: false
        default: true
        type: boolean
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve_release:
    name: Resolve Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      draft: ${{ steps.resolve.outputs.draft }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Resolve release configuration
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            release_tag="${{ github.ref_name }}"
            draft="false"
            prerelease="false"
          else
            release_tag="${{ inputs.release_tag }}"
            draft="${{ inputs.draft }}"
            prerelease="${{ inputs.prerelease }}"

            if [ -z "$release_tag" ]; then
              echo "workflow_dispatch requires release_tag (example: v1.2.3)."
              exit 1
            fi

            if [[ "$release_tag" != v* ]]; then
              release_tag="v${release_tag}"
            fi
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "draft=$draft" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Report resolved release metadata
        run: |
          {
            echo "## Release metadata"
            echo "- Tag: ${{ steps.resolve.outputs.release_tag }}"
            echo "- Draft: ${{ steps.resolve.outputs.draft }}"
            echo "- Pre-release: ${{ steps.resolve.outputs.prerelease }}"
          } >> "$GITHUB_STEP_SUMMARY"

  detect_platforms:
    name: Detect Release Targets
    runs-on: ubuntu-latest
    needs: resolve_release
    outputs:
      desktop_enabled: ${{ steps.detect.outputs.desktop_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect desktop workspace
        id: detect
        run: |
          if [ -f src-tauri/tauri.conf.json ]; then
            echo "desktop_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report release targets
        run: |
          {
            echo "## Unified release target detection"
            echo "- Release tag: ${{ needs.resolve_release.outputs.release_tag }}"
            echo "- Web release: enabled"
            echo "- Desktop release: ${{ steps.detect.outputs.desktop_enabled }}"
          } >> "$GITHUB_STEP_SUMMARY"

  web_release:
    name: Web Release Artifact
    runs-on: ubuntu-latest
    needs: [resolve_release, detect_platforms]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build web distribution
        id: build
        run: yarn build

      - name: Archive web distribution
        id: archive
        run: |
          archive="phonograph-web-${{ needs.resolve_release.outputs.release_tag }}.tar.gz"
          checksum="${archive}.sha256"
          tar -czf "$archive" dist
          sha256sum "$archive" > "$checksum"
          echo "WEB_RELEASE_ARCHIVE=$archive" >> "$GITHUB_ENV"
          echo "WEB_RELEASE_CHECKSUM=$checksum" >> "$GITHUB_ENV"

      - name: Upload web build artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release-${{ needs.resolve_release.outputs.release_tag }}
          path: |
            ${{ env.WEB_RELEASE_ARCHIVE }}
            ${{ env.WEB_RELEASE_CHECKSUM }}
          retention-days: 30
          if-no-files-found: error

      - name: Publish web release artifact
        id: publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve_release.outputs.release_tag }}
          name: Phonograph Release ${{ needs.resolve_release.outputs.release_tag }}
          draft: ${{ needs.resolve_release.outputs.draft == 'true' }}
          prerelease: ${{ needs.resolve_release.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ${{ env.WEB_RELEASE_ARCHIVE }}
            ${{ env.WEB_RELEASE_CHECKSUM }}

      - name: Report web release status
        if: always()
        run: |
          {
            echo "## Web release"
            echo "- Build: ${{ steps.build.outcome }}"
            echo "- Archive: ${{ steps.archive.outcome }}"
            echo "- Artifact upload: ${{ steps.upload_artifact.outcome }}"
            echo "- Release publish: ${{ steps.publish_release.outcome }}"
            echo "- Job result: ${{ job.status }}"
            echo "- Uploaded ${WEB_RELEASE_ARCHIVE} and checksum ${WEB_RELEASE_CHECKSUM}."
          } >> "$GITHUB_STEP_SUMMARY"

  desktop_release:
    name: Desktop Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [resolve_release, detect_platforms]
    if: needs.detect_platforms.outputs.desktop_enabled == 'true'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Prepare Apple API key
        if: matrix.os == 'macos-latest'
        id: apple_api_key
        shell: bash
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          if [ -z "$APPLE_API_PRIVATE_KEY" ] || [ -z "$APPLE_API_KEY" ]; then
            echo "APPLE_API_PRIVATE_KEY and APPLE_API_KEY secrets are required for macOS signing"
            exit 1
          fi

          key_file="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          echo "$APPLE_API_PRIVATE_KEY" > "$key_file"
          echo "APPLE_API_KEY_PATH=$key_file" >> "$GITHUB_ENV"

      - name: Validate desktop signing configuration
        id: desktop_signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_WINDOWS_CERTIFICATE: ${{ secrets.TAURI_WINDOWS_CERTIFICATE }}
          TAURI_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.TAURI_WINDOWS_CERTIFICATE_PASSWORD }}
        run: node scripts/validate-desktop-signing-env.mjs --force

      - name: Build and publish signed desktop bundles
        id: desktop_build_publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          TAURI_WINDOWS_CERTIFICATE: ${{ secrets.TAURI_WINDOWS_CERTIFICATE }}
          TAURI_WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.TAURI_WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ needs.resolve_release.outputs.release_tag }}
          releaseName: Phonograph Release ${{ needs.resolve_release.outputs.release_tag }}
          releaseBody: Automated web and desktop release artifacts for ${{ needs.resolve_release.outputs.release_tag }}.
          releaseDraft: ${{ needs.resolve_release.outputs.draft == 'true' }}
          prerelease: ${{ needs.resolve_release.outputs.prerelease == 'true' }}
          includeDebug: false
          tauriScript: yarn desktop:build:ci

      - name: Report desktop release status
        if: always()
        shell: bash
        run: |
          {
            echo "## Desktop release (${{ matrix.os }})"
            echo "- Apple API key prep: ${{ steps.apple_api_key.outcome }}"
            echo "- Signing validation: ${{ steps.desktop_signing.outcome }}"
            echo "- Build + publish: ${{ steps.desktop_build_publish.outcome }}"
            echo "- Job result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  release_status:
    name: Release Status Summary
    runs-on: ubuntu-latest
    needs: [resolve_release, detect_platforms, web_release, desktop_release]
    if: always()
    steps:
      - name: Summarize release outcome
        run: |
          resolve_release="${{ needs.resolve_release.result }}"
          detect_platforms="${{ needs.detect_platforms.result }}"
          web_release="${{ needs.web_release.result }}"
          desktop_release="${{ needs.desktop_release.result }}"
          release_tag="${{ needs.resolve_release.outputs.release_tag }}"

          {
            echo "## Unified release status"
            echo "- Release tag: ${release_tag}"
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Resolve release metadata | ${resolve_release} |"
            echo "| Target detection | ${detect_platforms} |"
            echo "| Web release | ${web_release} |"
            echo "| Desktop release | ${desktop_release} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$resolve_release" != "success" ]; then
            echo "Release metadata resolution failed."
            exit 1
          fi

          if [ "$detect_platforms" != "success" ]; then
            echo "Target detection failed."
            exit 1
          fi

          if [ "$web_release" != "success" ]; then
            echo "Web release failed."
            exit 1
          fi

          if [ "$desktop_release" != "success" ] && [ "$desktop_release" != "skipped" ]; then
            echo "Desktop release failed."
            exit 1
          fi
