name: Unified CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect_platforms:
    name: Detect Targets
    runs-on: ubuntu-latest
    outputs:
      desktop_enabled: ${{ steps.detect.outputs.desktop_enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect desktop workspace
        id: detect
        run: |
          if [ -f src-tauri/tauri.conf.json ]; then
            echo "desktop_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report target matrix
        run: |
          {
            echo "## Unified CI target detection"
            echo "- Desktop enabled: ${{ steps.detect.outputs.desktop_enabled }}"
            echo "- Web enabled: true"
          } >> "$GITHUB_STEP_SUMMARY"

  web_quality:
    name: Web Quality
    runs-on: ubuntu-latest
    needs: detect_platforms
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        id: typecheck
        run: yarn typecheck

      - name: Unit tests
        id: tests
        run: yarn test

      - name: Build web distribution
        id: build
        run: yarn build

      - name: Upload web build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist
          retention-days: 14
          if-no-files-found: error

      - name: Report web status
        if: always()
        run: |
          {
            echo "## Web quality"
            echo "- Typecheck: ${{ steps.typecheck.outcome }}"
            echo "- Unit tests: ${{ steps.tests.outcome }}"
            echo "- Build: ${{ steps.build.outcome }}"
            echo "- Job result: ${{ job.status }}"
            echo "- Dist artifact uploaded for downstream inspection."
          } >> "$GITHUB_STEP_SUMMARY"

  desktop_quality:
    name: Desktop Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: detect_platforms
    if: needs.detect_platforms.outputs.desktop_enabled == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Validate desktop build
        id: desktop_build
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Report desktop status
        if: always()
        shell: bash
        run: |
          {
            echo "## Desktop quality (${{ matrix.os }})"
            echo "- Rust compile check: ${{ steps.desktop_build.outcome }}"
            echo "- Job result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

  ci_status:
    name: CI Status Summary
    runs-on: ubuntu-latest
    needs: [detect_platforms, web_quality, desktop_quality]
    if: always()
    steps:
      - name: Summarize pipeline outcome
        run: |
          detect_platforms="${{ needs.detect_platforms.result }}"
          web_quality="${{ needs.web_quality.result }}"
          desktop_quality="${{ needs.desktop_quality.result }}"

          {
            echo "## Unified CI status"
            echo "| Stage | Result |"
            echo "| --- | --- |"
            echo "| Target detection | ${detect_platforms} |"
            echo "| Web quality | ${web_quality} |"
            echo "| Desktop quality | ${desktop_quality} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$detect_platforms" != "success" ]; then
            echo "Target detection failed."
            exit 1
          fi

          if [ "$web_quality" != "success" ]; then
            echo "Web quality checks failed."
            exit 1
          fi

          if [ "$desktop_quality" != "success" ] && [ "$desktop_quality" != "skipped" ]; then
            echo "Desktop quality checks failed."
            exit 1
          fi
